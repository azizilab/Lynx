name: CI

# Validate the docs build and the test suite on every push / PR. This is the
# pre-flight gate before ReadTheDocs builds: a broken Sphinx build or a broken
# `import lynx` shows up here (red check) rather than silently on RTD.
#
# The tutorial notebooks aren't atomatically executed in CI unless we have package
# version bumps that are associated with changes to the notebooks themselves or failure
# of unittests.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docs:
    name: Docs build (mocked stack)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: pip
      - name: Install pandoc (nbsphinx) + docs deps
        run: |
          sudo apt-get update && sudo apt-get install -y pandoc
          python -m pip install --upgrade pip
          pip install -r docs/requirements-docs.txt
      # Heavy ML deps are mocked via autodoc_mock_imports, so no torch/GPU here.
      # -n (nitpicky) + --keep-going surfaces broken autosummary / toctree refs.
      - name: Strict Sphinx build
        run: python -m sphinx -b html -n --keep-going docs docs/_build/html

  tests:
    name: Unit tests (import + IO + dataset)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: pip
      # Install the pinned stack CPU-only. The find-links index supplies the
      # PyG companion wheels (torch-sparse) that are not on plain PyPI.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -f https://data.pyg.org/whl/torch-2.3.1+cpu.html
          # scFates 1.0.8 has stale pins (pandas<2.0) that conflict with squidpy
          # (pandas>=2.1.0); install it out of the resolver. Its real runtime deps
          # are already pulled by requirements.txt, so --no-deps is safe.
          pip install scFates==1.0.8 --no-deps
          pip install -e . --no-deps
          pip install pytest
      - name: Run pytest
        run: python -m pytest -q tests/
