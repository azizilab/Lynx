# ReadTheDocs build configuration for LYNX.
# https://docs.readthedocs.io/en/stable/config-file/v2.html
version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.9"
  apt_packages:
    - pandoc          # required by nbsphinx to convert notebooks

sphinx:
  configuration: docs/conf.py

python:
  install:
    - requirements: docs/requirements-docs.txt
  # NOTE: the heavy ML stack (torch / torch-geometric / pyro / squidpy / cv2 /
  # scanpy / scFates) is mocked in docs/conf.py via autodoc_mock_imports, so we
  # deliberately do NOT install the full package here.
